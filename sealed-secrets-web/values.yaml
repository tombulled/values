### extras ###
extras:
  rawResources:
    - apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: sealed-secrets-web
      spec:
        parentRefs:
          - name: traefik-gateway
            namespace: traefik
        hostnames:
          - localhost
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /sealed-secrets
            filters:
              - type: URLRewrite
                urlRewrite:
                  # hostname: elsewhere.example
                  path:
                    type: ReplaceFullPath
                    replacePrefixMatch: /
            backendRefs:
              - name: sealed-secrets-web
                namespace: sealed-secrets # remove me?
                port: 80
