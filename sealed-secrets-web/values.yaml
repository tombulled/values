#           pathType: ImplementationSpecific

### extras ###
extras:
  rawResources:
    - apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: sealed-secrets-web
      spec:
        parentRefs:
          - name: traefik
            sectionName: http
            kind: Gateway
        hostnames:
          - localhost
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /sealed-secrets
            backendRefs:
              - name: sealed-secrets-web
                port: 80
