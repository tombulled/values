fullnameOverride: argocd


configs:
  secret:
    # Whether to create the argocd-secret
    createSecret: false

  params:
    server.insecure: true
    server.rootpath: "/argo-cd"

    application.namespaces: "*"
    applicationsetcontroller.namespaces: "*"
    applicationsetcontroller.allowed.scm.providers: git@github.com:tombulled/k8s.git
    applicationsetcontroller.tokenref.strict.mode: "true"

  # secrets:
  #   # Password generated using: python3 -c "import bcrypt,sys; print(bcrypt.hashpw(sys.stdin.read().strip().encode(), bcrypt.gensalt()).decode())" <<< "admin"
  #   # Note: `bcrypt` can be installed using: python3 -m pip install bcrypt
  #   argocdServerAdminPassword: "$2b$12$tr.kWcGd2HB3TNqJt7F.p.SWYfyjvUnea5mbh5HzAU5Wu1Ey6mk.S"

server:
  # ingress:
  #   enabled: true
  #   ingressClassName: nginx
  #   annotations:
  #     cert-manager.io/cluster-issuer: hawk-acme
  #   tls: true

  httproute:
    enabled: true
    parentRefs:
      - name: traefik-gateway
        namespace: traefik
    # hostnames: []
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /argo-cd
      # - matches:
      #     - path:
      #         type: PathPrefix
      #         value: /argo-cd
      #   filters:
      #     - type: URLRewrite
      #       urlRewrite:
      #         path:
      #           type: ReplacePrefixMatch
      #           replacePrefixMatch: /

applicationSet:
  allowAnyNamespace: true

extraObjects:
  - apiVersion: bitnami.com/v1alpha1
    kind: SealedSecret
    metadata:
      name: argocd-secret
      namespace: argocd
    spec:
      encryptedData:
        admin.password: 
