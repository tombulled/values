  #   kind: HTTPRoute
  #   metadata:
  #     name: '{{ printf "%s-%s" (include "kube-prometheus-stack.fullname" .) "thanos-gateway" }}'
  #   spec:
  #     parentRefs:
  #       - group: gateway.networking.k8s.io
  #         kind: Gateway
  #         name: traefik-gateway
  #         namespace: traefik
  #     hostnames:
  #       - localhost
  #     rules:
  #       - matches:
  #           - path:
  #               type: PathPrefix
  #               value: /thanos-gateway
  #         backendRefs:
  #           - group: ''
  #             kind: Service
  #             name: '{{ printf "%s-%s" (include "kube-prometheus-stack.fullname" .) "thanos-discovery" }}'
  #             port: 10901
  #             weight: 1
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: '{{ printf "%s-%s" (include "kube-prometheus-stack.fullname" .) "grafana" }}'
    spec:
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - localhost
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /grafana
          backendRefs:
            - group: ""
              kind: Service
              name: '{{ printf "%s-%s" (include "kube-prometheus-stack.fullname" .) "grafana" }}'
              port: 80
              weight: 1
