extraManifests:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: '{{ printf "%s-%s" (include "kube-prometheus-stack.fullname" .) "grafana" }}'
    spec:
      parentRefs:
        - name: traefik-gateway
          namespace: traefik
      hostnames:
        - localhost
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /grafana
          backendRefs:
            - name: '{{ printf "%s-%s" (include "kube-prometheus-stack.fullname" .) "grafana" }}'
              port: 80 # http-web
